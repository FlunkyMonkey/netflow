apiVersion: v1
kind: ConfigMap
metadata:
  name: new-device-flux
  namespace: netflow
data:
  influxdb-task-new-device.flux: |
    import "strings"

    option task = {name: "new-device-detection", every: 5m}

    // Get historical external IPs as an array for set membership check
    histTable = from(bucket: "netflow")
      |> range(start: -24h, stop: -5m)
      |> filter(fn: (r) => r._measurement == "netflow")
      |> keep(columns: ["src"])
      |> distinct(column: "src")

    histIPs = histTable |> findColumn(fn: (key) => true, column: "_value")

    // Recent external IPs not seen in the historical window → write to alert bucket
    from(bucket: "netflow")
      |> range(start: -5m)
      |> filter(fn: (r) => r._measurement == "netflow")
      |> keep(columns: ["src"])
      |> distinct(column: "src")
      // Exclude private/internal ranges
      |> filter(fn: (r) =>
          not strings.hasPrefix(v: r._value, prefix: "172.18.") and
          not strings.hasPrefix(v: r._value, prefix: "10.") and
          not strings.hasPrefix(v: r._value, prefix: "192.168."))
      // Anti-join: only keep IPs not seen in historical window
      |> filter(fn: (r) => not contains(value: r._value, set: histIPs))
      // Only write if historical data exists (grace period: skip first 24h after deploy)
      |> filter(fn: (r) => length(arr: histIPs) > 0)
      |> map(fn: (r) => ({
          _time: now(),
          _measurement: "netflow_new_devices",
          src: r._value,
          _field: "new_device",
          _value: 1
      }))
      |> to(bucket: "netflow", org: "homelab")
