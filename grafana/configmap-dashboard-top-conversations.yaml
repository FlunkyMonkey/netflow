apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-top-conversations
  namespace: netflow
data:
  top-conversations.json: |
    {
      "title": "Top Conversations",
      "uid": "netflow-top-conversations",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Top Conversations by Bytes",
          "type": "table",
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "options": {
            "sortBy": [{ "displayName": "in_bytes", "desc": true }]
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "PE1145B8E425975A4" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and (r._field == \"in_bytes\" or r._field == \"src\" or r._field == \"dst\" or r._field == \"src_host\" or r._field == \"dst_host\"))\n  |> pivot(rowKey: [\"_time\", \"source\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> map(fn: (r) => ({r with src_display: if exists r.src_host and r.src_host != \"\" then r.src_host else r.src, dst_display: if exists r.dst_host and r.dst_host != \"\" then r.dst_host else r.dst}))\n  |> group(columns: [\"src_display\", \"dst_display\"])\n  |> sum(column: \"in_bytes\")\n  |> group()\n  |> sort(columns: [\"in_bytes\"], desc: true)\n  |> limit(n: 20)",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": { "list": [] }
    }
