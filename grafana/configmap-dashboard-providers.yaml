apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: netflow
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: netflow
        folder: Netflow
        type: file
        disableDeletion: true
        options:
          path: /etc/grafana/provisioning/dashboards
