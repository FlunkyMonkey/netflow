apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-top-talkers
  namespace: netflow
data:
  top-talkers.json: |
    {
      "title": "Top Talkers",
      "uid": "netflow-top-talkers",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "1m",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Top Talkers by Bytes",
          "type": "barchart",
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "PE1145B8E425975A4" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and (r._field == \"in_bytes\" or r._field == \"src\"))\n  |> pivot(rowKey: [\"_time\", \"source\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> group(columns: [\"src\"])\n  |> sum(column: \"in_bytes\")\n  |> group()\n  |> sort(columns: [\"in_bytes\"], desc: true)\n  |> limit(n: 20)",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": { "list": [] }
    }
