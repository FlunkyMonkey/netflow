apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-top-apps
  namespace: netflow
data:
  top-apps.json: |
    {
      "title": "Top Applications",
      "uid": "netflow-top-apps",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Top Applications by Packets (dst port)",
          "type": "barchart",
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "short"
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "${datasource}" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and r._field == \"in_packets\")\n  |> group(columns: [\"dst_port\", \"protocol\"])\n  |> sum()\n  |> sort(columns: [\"_value\"], desc: true)\n  |> limit(n: 20)",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "influxdb",
            "current": {}
          }
        ]
      }
    }
