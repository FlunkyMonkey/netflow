apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-top-apps
  namespace: netflow
data:
  top-apps.json: |
    {
      "title": "Top Applications",
      "uid": "netflow-top-apps",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "5m",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Top Applications by Packets (dst port)",
          "type": "barchart",
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "short"
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "PE1145B8E425975A4" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and (r._field == \"in_packets\" or r._field == \"dst_port\" or r._field == \"protocol\"))\n  |> pivot(rowKey: [\"_time\", \"source\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> filter(fn: (r) => exists r.dst_port and exists r.in_packets)\n  |> group(columns: [\"dst_port\", \"protocol\"])\n  |> sum(column: \"in_packets\")\n  |> group()\n  |> sort(columns: [\"in_packets\"], desc: true)\n  |> limit(n: 20)\n  |> map(fn: (r) => ({r with app: string(v: r.dst_port) + \"/\" + r.protocol}))\n  |> keep(columns: [\"app\", \"in_packets\"])",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": { "list": [] }
    }
