apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-device-flows
  namespace: netflow
data:
  device-flows.json: |
    {
      "title": "Device Flows",
      "uid": "netflow-device-flows",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Bytes Over Time — $device",
          "type": "timeseries",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "${datasource}" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\"\n      and r._field == \"in_bytes\"\n      and r[\"src\"] == \"${device}\")\n  |> aggregateWindow(every: 1m, fn: sum)",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "influxdb",
            "current": {}
          },
          {
            "name": "device",
            "type": "query",
            "datasource": { "type": "influxdb", "uid": "${datasource}" },
            "query": "from(bucket: \"netflow\")\n  |> range(start: -1h)\n  |> keep(columns: [\"src\", \"src_host\"])\n  |> distinct(column: \"src\")",
            "label": "Device",
            "multi": false,
            "includeAll": false,
            "current": {}
          }
        ]
      }
    }
