apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-device-flows
  namespace: netflow
data:
  device-flows.json: |
    {
      "title": "Device Flows",
      "uid": "netflow-device-flows",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Bytes Over Time — $device",
          "type": "timeseries",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "#c49a6c", "mode": "fixed" },
              "unit": "bytes",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "PE1145B8E425975A4" },
              "query": "from(bucket: \"netflow\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and (r._field == \"in_bytes\" or r._field == \"src\" or r._field == \"src_host\"))\n  |> pivot(rowKey: [\"_time\", \"source\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> map(fn: (r) => ({r with device: if exists r.src_host and r.src_host != \"\" then r.src_host else r.src}))\n  |> filter(fn: (r) => r.device == \"${device}\")\n  |> keep(columns: [\"_time\", \"in_bytes\"])\n  |> rename(columns: {in_bytes: \"_value\"})\n  |> aggregateWindow(every: 1m, fn: sum, createEmpty: false)",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "device",
            "type": "query",
            "datasource": { "type": "influxdb", "uid": "PE1145B8E425975A4" },
            "query": "from(bucket: \"netflow\")\n  |> range(start: -1h)\n  |> filter(fn: (r) => r._measurement == \"netflow\" and (r._field == \"src\" or r._field == \"src_host\"))\n  |> pivot(rowKey: [\"_time\", \"source\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> map(fn: (r) => ({r with device: if exists r.src_host and r.src_host != \"\" then r.src_host else r.src}))\n  |> keep(columns: [\"device\"])\n  |> distinct(column: \"device\")",
            "label": "Device",
            "multi": false,
            "includeAll": false,
            "current": {}
          }
        ]
      }
    }
