apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ini
  namespace: netflow
data:
  grafana.ini: |
    [server]
    root_url = http://netflow.vgriz.com

    [auth.anonymous]
    enabled = true
    org_role = Viewer

    [auth]
    disable_login_form = false

    [panels]
    disable_sanitize_html = true
