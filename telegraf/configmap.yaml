apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: netflow
data:
  telegraf.conf: |
    [agent]
      interval = "1m"
      flush_interval = "60s"
      flush_jitter = "10s"
      metric_buffer_limit = 100000

    [[inputs.netflow]]
      service_address = "udp://:2055"

    # DNS enrichment for source IP
    # Field names verified via Phase 3 discovery — update if schema.md differs
    [[processors.dns_lookup]]
      nameservers = ["172.18.232.10:53", "172.18.5.10:53"]
      cache_ttl = "5m"
      lookup_timeout = "3s"
      max_parallel_lookups = 20
      origin = "source_ipv4_address"
      dest = "src_host"

    # DNS enrichment for destination IP
    [[processors.dns_lookup]]
      nameservers = ["172.18.232.10:53", "172.18.5.10:53"]
      cache_ttl = "5m"
      lookup_timeout = "3s"
      max_parallel_lookups = 20
      origin = "destination_ipv4_address"
      dest = "dst_host"

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb.netflow.svc.cluster.local:8086"]
      token = "$INFLUXDB_TOKEN"
      organization = "homelab"
      bucket = "netflow"
