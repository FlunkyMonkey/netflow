apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: netflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      initContainers:
        - name: wait-for-influxdb
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              until curl -sf http://influxdb.netflow.svc.cluster.local:8086/health; do
                echo "waiting for influxdb..."; sleep 5
              done
      containers:
        - name: telegraf
          image: telegraf:1.30
          ports:
            - containerPort: 2055
              protocol: UDP
          envFrom:
            - secretRef:
                name: telegraf-influxdb-token
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: telegraf-config
